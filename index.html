<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>CAR EM DIA | Regularização Inteligente</title>
    <link rel="stylesheet" href="backend/static/css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

<div class="app">
    <header class="topbar">
        <img src="image_5b60a7.png" alt="Logo" style="width: 120px;">
        <h1>CAR EM DIA</h1>
        <p>Regularização Ambiental Inteligente</p>
        <div class="stepper">
            <span id="step1" class="step active">1</span>
            <span id="step2" class="step">2</span>
            <span id="step3" class="step">3</span>
            <span id="step4" class="step">4</span>
            <span id="step5" class="step">5</span>
        </div>
    </header>

    <section id="tela1" class="tela active">
        <h2>Jornada de Regularização</h2>
        <button onclick="irPara('tela2')">Novo Cadastro</button>
        <button onclick="irPara('tela-not')">Consultar Pendências</button>
    </section>

    <section id="tela-not" class="tela">
        <h2>Consultar Pendências</h2>
        <input type="text" placeholder="Código do CAR (ex: SP-12345)">
        <button onclick="irPara('tela3')">Consultar na Base</button>
        <button class="btn-back" onclick="irPara('tela1')">← Voltar</button>
    </section>

    <section id="tela2" class="tela">
        <h2>Cadastro do Imóvel</h2>
        <input type="text" placeholder="Nome da propriedade">
        <input type="number" placeholder="Área (ha)">
        <button onclick="irPara('tela3')">Continuar</button>
        <button class="btn-back" onclick="irPara('tela1')">← Voltar</button>
    </section>

    <section id="tela3" class="tela">
        <h2>Mapa Inteligente</h2>
        <div class="coord-box">
            <input type="text" id="lat" placeholder="Lat">
            <input type="text" id="lng" placeholder="Lng">
            <button onclick="buscarCoordenadas()">Ir</button>
        </div>
        <div id="map"></div>
        <button onclick="analisarComIA()">Analisar com IA</button>
        <button class="btn-back" onclick="irPara('tela2')">← Voltar</button>
    </section>

    <section id="tela4" class="tela">
        <h2>Análise da IA</h2>
        <div class="semaforo">🟢 BAIXO RISCO</div>
        <div class="ia-box"><p>IA: Sobreposição em APP detectada.</p></div>
        <div class="plano"><h3>Plano de Ação</h3><ul><li>Ajustar APP</li><li>Revisar polígono</li></ul></div>
        <button onclick="irPara('tela5')">Ver Dossiê</button>
        <button class="btn-back" onclick="irPara('tela3')">← Voltar</button>
    </section>

    <section id="tela5" class="tela">
        <h2>Dossiê Final</h2>
        <div class="dossie"><p>✔ Cadastro validado</p></div>
        <button onclick="alert('PDF gerado!')">Baixar PDF</button>
        <button class="btn-back" onclick="irPara('tela1')">🏠 Início</button>
    </section>
</div>

<script src="backend/static/js/script.js"></script>
<script src="backend/static/js/script.js"></script>
</body>
</html>
